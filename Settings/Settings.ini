[Rainmeter]
Update=-1
OnRefreshAction=[!SetOption FullSkinArea MouseLeaveAction "[]" "SteamyRain"][!UpdateMeter FullSkinArea "SteamyRain"]

[Variables]
@include=#@#SkinInfo.inc
@include2=#@#GamesInfo.inc
@include3=#@#NonSteamGames.inc
ActiveConf="SteamyRainList.ini"
DefaultVisTile=3.#Half#
DefaultGap=0
MaxGap=100
VisTileN=VisibleTiles
VisTile=#VisibleTiles#
YPLUS=([TilePixelsY]+20)
XPLUS=0
ScrollOffset=0

;_________________________________________________
;____________________MEASURES_____________________
[TilePixelsY]
Measure=Calc
Formula=((#TilePixels#*46.74)/100)
DynamicVariables=1

[ModeCheck]
Measure=Calc
IfCondition=#Mode#=0
IfTrueAction=[!SetVariable XPLUS "(#TilePixels#+1)"][!SetVariable VisTile "#VisibleTilesL#"][!SetVariable VisTileN "VisibleTilesL"][!SetVariable DefaultVisTile "2.#Half#"][!SetVariable ActiveConf "SteamyRainList.ini"][!SetVariable YPLUS "0"][!UpdatemeterGroup Mode][!EnableMeasure MoveWindow][!UpdateMeasure MoveWindow][!ReDraw]
IfFalseAction=[!SetVariable ActiveConf "SteamyRain.ini"][!EnableMeasure MoveWindow][!UpdateMeasure MoveWindow][!ReDraw]
IfConditionMode=1
DynamicVariables=1

; --- TRADUCAO DAS CORES DOS CHECKBOXES ---
; Logica: Preto (#Dark2#) = Ativo/True. Vazio (0,0,0,1) = Inativo/False.
[MeasureArrowColor]
Measure=Calc
Formula=#Arrows#
Substitute="1":"#Dark2#","0":"0,0,0,1"
DynamicVariables=1

[MeasureFadeColor]
Measure=Calc
Formula=#Fade#
Substitute="1":"#Dark2#","0":"0,0,0,1"
DynamicVariables=1

[MeasureHeadColor]
Measure=Calc
Formula=#Header#
Substitute="1":"#Dark2#","0":"0,0,0,1"
DynamicVariables=1

[MeasureHalfTilesColor]
Measure=Calc
Formula=#HalfTiles#
Substitute="1":"#Dark2#","0":"0,0,0,1"
DynamicVariables=1

[MeasureNonSteamColor]
Measure=Calc
Formula=#NonSteamFirst#
Substitute="0":"#Dark2#","1":"0,0,0,1"
DynamicVariables=1
; -----------------------------------------

[TileSizeCheck]
Measure=Calc
Formula=(((#TilePixels#-170)*95)/130)
OnUpdateAction=[!SetVariable TilePixels "#TilePixels#" "SteamyRain" "#ActiveConf#"][!UpdateMeasure TilePixelsY "SteamyRain" "#ActiveConf#"][!UpdateMeter TileSizeBar][!ReDraw]
DynamicVariables=1

[SortModeCheck]
Measure=Calc
Formula=#SortMode#
Substitute="0":"Default","1":"Playtime","2":"Last Played"
OnUpdateAction=[!WriteKeyValue Variables SortMode "[SortModeCheck:]" "#@#SkinInfo.inc"][!UpdateMeter SortModeText][!ReDraw]
DynamicVariables=1

[arrowCheck]
Measure=Calc
OnUpdateAction=[!UpdateMeasure Offset "SteamyRain"]
DynamicVariables=1
Disabled=1

[fadeCheck]
Measure=Calc
IfCondition=#Fade#=1
IfTrueAction=[!WriteKeyValue Variables fadeMode OFF "#@#SkinInfo.inc"][!SetVariable FadeMode OFF "SteamyRain"][!UpdateMeter Container "SteamyRain"][!ReDraw "SteamyRain"]
IfFalseAction=[!WriteKeyValue Variables fadeMode ON "#@#SkinInfo.inc"][!SetVariable FadeMode ON "SteamyRain"][!UpdateMeter Container "SteamyRain"][!ReDraw "SteamyRain"]
DynamicVariables=1
Disabled=1

[headCheck]
Measure=Calc
OnUpdateAction=[!UpdateMeterGroup HeaderHide "SteamyRain"][!ReDraw "SteamyRain"]
DynamicVariables=1
Disabled=1

[VisibleTilesCheck]
Measure=Calc
Formula=(Floor(#VisTile#))
OnUpdateAction=[!UpdateMeterGroup Vis][!WriteKeyValue Variables #VisTileN# #VisTile# "#@#SkinInfo.inc"][!SetVariable #VisTileN# #VisTile# "SteamyRain"][!UpdateMeasure Lenght "SteamyRain"][!ReDraw]
DynamicVariables=1

[HalfTileCheck]
Measure=Calc
IfCondition=#HalfTiles#=1
IfTrueAction=[!SetVariable Half 0][!SetVariable VisTile (#VisTile#-0.5)][!WriteKeyValue Variables Half 0 "#@#SkinInfo.inc"][!UpdateMeterGroup HalfTile][!UpdateMeasure VisibleTilesCheck]
IfFalseAction=[!SetVariable Half 5][!SetVariable VisTile (#VisTile#+0.5)][!WriteKeyValue Variables Half 5 "#@#SkinInfo.inc"][!UpdateMeterGroup HalfTile][!UpdateMeasure VisibleTilesCheck]
DynamicVariables=1
Disabled=1

[GapBetweenTilesCheck]
Measure=Calc
Formula=(Floor(#GapBetweenTiles#))
OnUpdateAction=[!UpdateMeterGroup Vis][!WriteKeyValue Variables GapBetweenTiles #GapBetweenTiles# "#@#SkinInfo.inc"][!SetVariable GapBetweenTiles #GapBetweenTiles# "SteamyRain"][!UpdateMeasure Lenght "SteamyRain"][!ReDraw]
DynamicVariables=1

[HiddenCheck]
Measure=Calc
IfCondition=#hiddenWindow#=1
IfTrueAction=[!Refresh "SteamyRain\Hidden" "Hidden.ini"]

[MoveWindow]
Measure=Calc
OnUpdateAction=[!Move "(#SkinPosX#+#XPLUS#)" "(#SkinPosY#+#YPLUS#)"]
DynamicVariables=1
Disabled=1

