[Rainmeter]
Update=-1
OnRefreshAction=[!Move "(#SkinPosX# + 20)" "(#SkinPosY# + 40)"][!CommandMeasure MeasureLua "LoadGames()"]

[Variables]
@include=#@#SkinInfo.inc
TempName=""
TempPath=""
TempImage=""
CurrentIndex=0

[MeasureLua]
Measure=Script
ScriptFile=Manager.lua

; --- INPUT PLUGINS ---
[InputName]
Measure=Plugin
Plugin=InputText
SolidColor=#InputBG#
FontColor=#TextColor#
FontSize=10
FontFace=Segoe UI
X=25
Y=275
W=310
H=20
DefaultValue="#TempName#"
Command1=[!SetVariable TempName "$UserInput$"][!UpdateMeter NameDisplay][!ReDraw]

[InputPath]
Measure=Plugin
Plugin=InputText
SolidColor=#InputBG#
FontColor=#TextColor#
FontSize=10
FontFace=Segoe UI
X=25
Y=330
W=310
H=20
DefaultValue="#TempPath#"
Command1=[!SetVariable TempPath "$UserInput$"][!UpdateMeter PathDisplay][!ReDraw]

[InputImage]
Measure=Plugin
Plugin=InputText
SolidColor=#InputBG#
FontColor=#TextColor#
FontSize=10
FontFace=Segoe UI
X=25
Y=385
W=310
H=20
DefaultValue="#TempImage#"
Command1=[!SetVariable TempImage "$UserInput$"][!UpdateMeter ImageDisplay][!ReDraw]

; --- BACKGROUND & HEADER ---
[Background]
Meter=Shape
Shape=Rectangle 0,0,360,480,6 | Fill Color #Dark1# | StrokeWidth 1 | Stroke Color #Dark2#
Shape2=Line 20,225,340,225 | StrokeWidth 1 | Stroke Color #Dark2#
DynamicVariables=1

[CloseButton]
Meter=String
Text="[\xe8bb]"
FontFace=Segoe Fluent Icons
FontSize=10
FontColor=#TextColor#
SolidColor=0,0,0,1
X=335
Y=10
AntiAlias=1
LeftMouseUpAction=[!DeactivateConfig]
MouseOverAction=[!SetOption CloseButton FontColor "#SettingsHover#"][!UpdateMeter CloseButton][!ReDraw]
MouseLeaveAction=[!SetOption CloseButton FontColor "#TextColor#"][!UpdateMeter CloseButton][!ReDraw]

[Title]
Meter=String
Text="Non-Steam Games Manager"
FontColor=#SettingsHover#
FontSize=12
FontFace=Segoe UI
StringStyle=Bold
X=180
Y=10
StringAlign=Center
AntiAlias=1

; --- LIST VIEW (TOP) ---
[ListScrollArea]
Meter=Shape
Shape=Rectangle 20,40,320,180 | Fill Color 0,0,0,1 | StrokeWidth 0
MouseScrollUpAction=[!CommandMeasure MeasureLua "ScrollList('up')"]
MouseScrollDownAction=[!CommandMeasure MeasureLua "ScrollList('down')"]
MouseActionCursor=0

[SlotStyle]
FontFace=Segoe UI
FontSize=10
FontColor=#TextColor#
SolidColor=0,0,0,1
Padding=5,3,5,3
W=310
X=20
Y=2R
AntiAlias=1
ClipString=1
Group=List
MouseOverAction=[!SetOption #CURRENTSECTION# FontColor "#SettingsHover#"][!UpdateMeter #CURRENTSECTION#][!Redraw]
MouseLeaveAction=[!SetOption #CURRENTSECTION# FontColor "#TextColor#"][!UpdateMeter #CURRENTSECTION#][!Redraw]

[Slot1Name]
Meter=String
MeterStyle=SlotStyle
Y=40

[Slot2Name]
Meter=String
MeterStyle=SlotStyle

[Slot3Name]
Meter=String
MeterStyle=SlotStyle

[Slot4Name]
Meter=String
MeterStyle=SlotStyle

[Slot5Name]
Meter=String
MeterStyle=SlotStyle

[Slot6Name]
Meter=String
MeterStyle=SlotStyle

[Slot7Name]
Meter=String
MeterStyle=SlotStyle

; --- EDITOR VIEW (BOTTOM) ---
[ModeTitle]
Meter=String
Text="Adicionar Novo Jogo"
FontColor=#SettingsHover#
FontSize=11
FontFace=Segoe UI
StringStyle=Bold
X=180
Y=235
StringAlign=Center
AntiAlias=1
Group=Editor

[NameLabel]
Meter=String
Text="Nome:"
FontColor=#TextColor#
FontSize=10
FontFace=Segoe UI
X=20
Y=255
AntiAlias=1

[NameBox]
Meter=Shape
Shape=Rectangle 20,272,320,26,4 | Fill Color #Dark2# | StrokeWidth 1 | Stroke Color #TextColor#,50
LeftMouseUpAction=[!CommandMeasure "InputName" "ExecuteBatch 1"]

[NameDisplay]
Meter=String
Text=#TempName#
FontColor=#TextColor#,200
FontSize=10
FontFace=Segoe UI
X=25
Y=275
W=310
ClipString=1
AntiAlias=1
DynamicVariables=1
Group=Editor

[PathLabel]
Meter=String
Text="Caminho (Exe):"
FontColor=#TextColor#
FontSize=10
FontFace=Segoe UI
X=20
Y=310
AntiAlias=1

[PathBox]
Meter=Shape
Shape=Rectangle 20,327,320,26,4 | Fill Color #Dark2# | StrokeWidth 1 | Stroke Color #TextColor#,50
LeftMouseUpAction=[!CommandMeasure "InputPath" "ExecuteBatch 1"]

[PathDisplay]
Meter=String
Text=#TempPath#
FontColor=#TextColor#,200
FontSize=10
FontFace=Segoe UI
X=25
Y=330
W=310
ClipString=1
AntiAlias=1
DynamicVariables=1
Group=Editor

[ImageLabel]
Meter=String
Text="Caminho (Imagem):"
FontColor=#TextColor#
FontSize=10
FontFace=Segoe UI
X=20
Y=365
AntiAlias=1

[ImageBox]
Meter=Shape
Shape=Rectangle 20,382,320,26,4 | Fill Color #Dark2# | StrokeWidth 1 | Stroke Color #TextColor#,50
LeftMouseUpAction=[!CommandMeasure "InputImage" "ExecuteBatch 1"]

[ImageDisplay]
Meter=String
Text=#TempImage#
FontColor=#TextColor#,200
FontSize=10
FontFace=Segoe UI
X=25
Y=385
W=310
ClipString=1
AntiAlias=1
DynamicVariables=1
Group=Editor

; --- BUTTONS ---
[NewButton]
Meter=String
Text="[\xe109]"
FontColor=#TextColor#
SolidColor=#Dark2#
Padding=5,5,5,5
FontSize=10
FontFace=Segoe Fluent Icons
X=20
Y=435
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureLua "PrepareNew()"]
MouseOverAction=[!SetOption NewButton FontColor "#SettingsHover#"][!UpdateMeter NewButton][!ReDraw]
MouseLeaveAction=[!SetOption NewButton FontColor "#TextColor#"][!UpdateMeter NewButton][!ReDraw]

[DeleteButton]
Meter=String
Text="Deletar"
FontColor=#TextBG#
SolidColor=200,60,60
Padding=10,5,10,5
FontSize=10
FontFace=Segoe UI
StringStyle=Bold
X=70
Y=435
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureLua "DeleteSelected()"]
MouseOverAction=[!SetOption DeleteButton SolidColor "220,90,90"][!UpdateMeter DeleteButton][!ReDraw]
MouseLeaveAction=[!SetOption DeleteButton SolidColor "200,60,60"][!UpdateMeter DeleteButton][!ReDraw]
Hidden=1
Group=Editor

[SaveButton]
Meter=String
Text="Save"
FontColor=#TextBG#
SolidColor=#SettingsHover#
Padding=10,5,10,5
FontSize=10
FontFace=Segoe UI
StringStyle=Bold
X=150
Y=435
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureLua "SaveGame()"]
MouseOverAction=[!SetOption SaveButton SolidColor "#TextColor#"][!UpdateMeter SaveButton][!ReDraw]
MouseLeaveAction=[!SetOption SaveButton SolidColor "#SettingsHover#"][!UpdateMeter SaveButton][!ReDraw]
Group=Editor

[ScanButton]
Meter=String
Text="Scan"
FontColor=#TextBG#
SolidColor=#SettingsHover#
Padding=10,5,10,5
FontSize=10
FontFace=Segoe UI
StringStyle=Bold
X=275
Y=435
AntiAlias=1
LeftMouseUpAction=["#@#UpdateGames.pyw"]
MouseOverAction=[!SetOption ScanButton SolidColor "#TextColor#"][!UpdateMeter ScanButton][!ReDraw]
MouseLeaveAction=[!SetOption ScanButton SolidColor "#SettingsHover#"][!UpdateMeter ScanButton][!ReDraw]